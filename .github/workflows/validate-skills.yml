name: Validate

on:
  pull_request:
    paths:
      - 'skills/**/*.md'
      - 'agents/*.md'
  push:
    branches: [main]
    paths:
      - 'skills/**/*.md'
      - 'agents/*.md'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check SKILL.md frontmatter
        run: |
          echo "Validating SKILL.md files..."
          errors=0
          while IFS= read -r file; do
            dir=$(basename "$(dirname "$file")")
            echo "  $file"

            if ! grep -Eq '^name: ' "$file"; then
              echo "    ERROR: missing 'name' in frontmatter"
              errors=$((errors + 1))
            fi

            if ! grep -Eq '^description: ' "$file"; then
              echo "    ERROR: missing 'description' in frontmatter"
              errors=$((errors + 1))
            fi

            name=$(grep -E '^name: ' "$file" | sed 's/^name: *//' | tr -d '[:space:]')
            if [ "$name" != "$dir" ]; then
              echo "    WARNING: name '$name' != directory '$dir'"
            fi
          done < <(find skills -name SKILL.md)
          [ "$errors" -eq 0 ] && echo "All skills valid." || exit 1

      - name: Check agent frontmatter
        run: |
          echo "Validating agent files..."
          errors=0
          for file in agents/*.md; do
            echo "  $file"

            if ! grep -Eq '^name: ' "$file"; then
              echo "    ERROR: missing 'name' in frontmatter"
              errors=$((errors + 1))
            fi

            if ! grep -Eq '^description: ' "$file"; then
              echo "    ERROR: missing 'description' in frontmatter"
              errors=$((errors + 1))
            fi
          done
          [ "$errors" -eq 0 ] && echo "All agents valid." || exit 1
