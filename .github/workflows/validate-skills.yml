name: Validate

on:
  pull_request:
    paths:
      - 'skills/**/*.md'
      - 'nextjs-expert-cto/*.md'
  push:
    branches: [main]
    paths:
      - 'skills/**/*.md'
      - 'nextjs-expert-cto/*.md'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check SKILL.md frontmatter
        run: |
          echo "Validating SKILL.md files..."
          errors=0
          while IFS= read -r file; do
            dir=$(basename "$(dirname "$file")")
            echo "  $file"

            if ! grep -Eq '^name: ' "$file"; then
              echo "    ERROR: missing 'name' in frontmatter"
              errors=$((errors + 1))
            fi

            if ! grep -Eq '^description: ' "$file"; then
              echo "    ERROR: missing 'description' in frontmatter"
              errors=$((errors + 1))
            fi

            name=$(grep -E '^name: ' "$file" | sed 's/^name: *//' | tr -d '[:space:]')
            if [ "$name" != "$dir" ]; then
              echo "    WARNING: name '$name' != directory '$dir'"
            fi
          done < <(find skills -name SKILL.md)
          [ "$errors" -eq 0 ] && echo "All skills valid." || exit 1

      - name: Validate agent SKILL.md
        run: |
          for dir in nextjs-expert-cto; do
            echo "Validating agent $dir/SKILL.md..."
            file="$dir/SKILL.md"
            if [ ! -f "$file" ]; then
              echo "ERROR: $file not found"
              exit 1
            fi
            grep -Eq '^name: ' "$file" || { echo "ERROR: missing 'name' in $file"; exit 1; }
            grep -Eq '^description: ' "$file" || { echo "ERROR: missing 'description' in $file"; exit 1; }
            grep -Eq '^skills:' "$file" || { echo "ERROR: missing 'skills' list in $file"; exit 1; }
            echo "  $dir valid."
          done
